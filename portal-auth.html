<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Login • MAPPHEX</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/images/enterprise-icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/images/enterprise-icon-192.png" />
    <meta name="theme-color" content="#06101f" />
    <link rel="stylesheet" href="director.css" />
    <link rel="stylesheet" href="management.css?v=2" />
    <link rel="stylesheet" href="onboarding.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page" data-page="portal-auth">
    <main class="auth-shell">
      <section class="auth-card" aria-label="Portal authentication">
        <div class="auth-brand">
          <img src="/images/enterprise-logo.png" alt="" />
          <div>
            <h1 id="portal-auth-title">Portal Login</h1>
            <p id="portal-auth-subtitle">Sign in with your organization account.</p>
          </div>
        </div>

        <form id="portal-login-form" class="auth-form portal-access-form" autocomplete="on">
          <label class="field"><span>Organization name</span><input name="organizationName" required autocomplete="organization" placeholder="Registered organization name" /></label>
          <label class="field"><span>Organization email</span><input name="identifier" type="email" required autocomplete="email" placeholder="Registered organization email" /></label>
          <label class="field"><span>Your name</span><input name="name" autocomplete="name" placeholder="Your registered name" /></label>
          <label class="field"><span>Your email</span><input name="email" type="email" required autocomplete="off" placeholder="Portal user email" /></label>
          <label class="field"><span>Portal password</span><input name="portalPassword" type="password" required autocomplete="new-password" minlength="6" placeholder="Portal user password" /></label>
          <label class="remember-row"><input name="remember" type="checkbox" checked /> <span>Keep me signed in on this device</span></label>
          <div class="auth-actions">
            <button id="portal-login-btn" class="btn primary" type="submit" name="intent" value="login">Open Portal</button>
            <button id="portal-register-btn" class="btn" type="submit" name="intent" value="register">Register Account</button>
          </div>
        </form>
        <p id="portal-auth-result" class="form-error" role="alert" aria-live="polite"></p>
        <div class="auth-footer"><a id="portal-auth-back" class="btn" href="organization-workspace.html">Back to workspace</a></div>
      </section>
    </main>
    <script>
      (() => {
        const params = new URLSearchParams(location.search);
        const tenant = params.get("tenant") || "";
        const link = document.getElementById("portal-auth-back");
        if (link && tenant) link.href = `organization-workspace.html?tenant=${encodeURIComponent(tenant)}`;
      })();
    </script>
    <script src="enterprise-core.js?v=2"></script>
    <script src="enterprise-modules.js?v=2"></script>
    <script src="pwa.js"></script>
    <script src="portal-auth.js?v=5"></script>
  </body>
</html>

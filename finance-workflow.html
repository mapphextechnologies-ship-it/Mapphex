<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Workflow</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="finance-workflow.css" />
  </head>
  <body data-page="organization-module">
    <main class="finance-workflow-shell">
      <header class="workflow-hero">
        <div>
          <p class="eyebrow">Finance workflow</p>
          <h1 id="workflow-title">Finance Action</h1>
          <p id="workflow-subtitle">Approved, pending, and related finance records.</p>
        </div>
        <a id="back-link" class="btn" href="organization-module.html?portal=finance">Back to Finance</a>
      </header>

      <section class="workflow-kpis" aria-label="Workflow totals">
        <article><span>Approved</span><strong id="approved-count">0</strong></article>
        <article><span>Pending</span><strong id="pending-count">0</strong></article>
        <article><span>Related Ledger</span><strong id="ledger-count">0</strong></article>
      </section>

      <section class="approved-section">
        <article class="workflow-panel">
          <div class="panel-head"><h2>Approved list</h2><span id="approved-label">0 records</span></div>
          <div id="approved-list" class="record-list"></div>
        </article>
      </section>

      <section class="workflow-grid">
        <article class="workflow-panel">
          <div class="panel-head"><h2>Pending list</h2><span id="pending-label">0 records</span></div>
          <div id="pending-list" class="record-list"></div>
        </article>
        <article class="workflow-panel wide">
          <div class="panel-head"><h2>Related ledger entries</h2><span id="ledger-label">0 records</span></div>
          <div id="ledger-list" class="record-list ledger-list"></div>
        </article>
      </section>
    </main>

    <script src="enterprise-core.js"></script>
    <script src="auth-guard.js"></script>
    <script src="finance-workflow.js"></script>
  </body>
</html>
